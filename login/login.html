<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contributor Login — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--card:#161616;--card2:#1a1a1a;--border:#232323;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#888;--white:#fff;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --font:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow-x:hidden;
}
.hero-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 65%);pointer-events:none;z-index:0}
.login-container{position:relative;z-index:1;width:100%;max-width:400px}
.login-card{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:36px;text-align:center;backdrop-filter:blur(10px)}
.logo-icon{width:48px;height:48px;background:var(--white);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.logo-icon svg{width:24px;height:24px;color:#000}
h1{font-size:1.3rem;font-weight:700;color:var(--white);margin-bottom:6px}
.sub{font-size:.72rem;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:16px;text-align:left}
.field label{font-size:.68rem;color:var(--muted2);display:block;margin-bottom:6px;font-family:var(--mono)}
.field input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:.62rem .85rem;color:var(--text);font-family:var(--mono);font-size:.78rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:rgba(255,255,255,.2)}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:var(--white);color:#000}
.btn-primary:hover{background:#e8e8e8;transform:translateY(-1px)}
.auth-switch{font-size:.72rem;color:var(--muted);margin-top:16px}
.auth-switch a{color:var(--white);text-decoration:none;cursor:pointer}
.auth-switch a:hover{text-decoration:underline}
.back-link{margin-top:16px;text-align:center}
.back-link a{color:var(--muted);font-size:.72rem;text-decoration:none}
.back-link a:hover{color:var(--white)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:.75rem;font-family:var(--mono);display:flex;align-items:center;gap:8px;z-index:9999;transition:all .3s;opacity:0;transform:translateY(12px);pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok .toast-dot{background:var(--green)}
.toast.err .toast-dot{background:var(--red)}
.toast-dot{width:7px;height:7px;border-radius:50%}
.progress-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;display:none}
.progress-overlay.show{display:flex}
.progress-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:32px;text-align:center}
.progress-spinner{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--white);animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hero-glow"></div>

<div class="login-container">
  <div class="login-card">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Contributor Login</h1>
    <p class="sub">Masukkan username dan password</p>
    
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="cth: dilzzwkwk">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="******" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    
    <button class="btn btn-primary" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Login
    </button>
    
    <div class="auth-switch">
      <span>Belum punya akun? </span>
      <a href="../register/register.html">Daftar disini</a>
    </div>
    
    <div class="back-link">
      <a href="../index.html">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="toast-dot"></div><div class="toast-msg" id="toastMsg"></div></div>

<!-- PROGRESS -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-card">
    <div class="progress-spinner"></div>
    <div class="progress-title" style="color:var(--white);margin-bottom:6px">Login...</div>
  </div>
</div>

<script>
const API_URL = '/api';

async function callAPI(endpoint, method, body = null) {
  const options = {
    method: method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (body) options.body = JSON.stringify(body);
  
  const response = await fetch(`${API_URL}/${endpoint}`, options);
  return await response.json();
}

function showProgress(show) {
  const el = document.getElementById('progressOverlay');
  if (show) el.classList.add('show');
  else el.classList.remove('show');
}

function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  
  if (!username || !password) {
    toast('Username dan password wajib diisi', 'err');
    return;
  }
  
  showProgress(true);
  
  try {
    const result = await callAPI('login.js', 'POST', { username, password });
    showProgress(false);
    
    if (!result.success) {
      toast(result.error || 'Login gagal', 'err');
      return;
    }
    
    // Login sukses
    localStorage.setItem('contributor_user', JSON.stringify(result.data));
    
    toast('✅ Login berhasil! Mengarahkan...', 'ok');
    setTimeout(() => {
      window.location.href = '../contributor-dashboard.html';
    }, 1000);
  } catch (error) {
    showProgress(false);
    toast('❌ Gagal terhubung ke server', 'err');
  }
}
</script>
</body>
</html>
