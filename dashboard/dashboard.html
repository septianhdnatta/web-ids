<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>Dashboard — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --sidebar:#0a0a0a;
  --card:#161616;
  --card2:#1a1a1a;
  --border:#232323;
  --border2:#2a2a2a;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#888;
  --white:#fff;
  --purple:#a855f7;
  --pink:#ec4899;
  --green:#10b981;
  --red:#ef4444;
  --yellow:#f59e0b;
  --font:'Inter',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html, body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  width:260px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:100;
  transition:transform .3s ease;
}
.sidebar-header{
  padding:20px 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.sidebar-logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:1rem;
  font-weight:700;
  color:var(--white);
  text-decoration:none;
}
.sidebar-logo-icon{
  width:28px;
  height:28px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
  color:#fff;
  font-weight:900;
}
.sidebar-nav{
  flex:1;
  padding:0 12px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:10px;
  color:var(--muted2);
  font-size:.85rem;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:4px;
  width:100%;
  background:none;
  border:none;
  text-align:left;
}
.nav-item svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  stroke-width:1.5;
  flex-shrink:0;
}
.nav-item:hover{
  background:rgba(255,255,255,.05);
  color:var(--white);
}
.nav-item.active{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;
}
.nav-item.logout{
  margin-top:20px;
  color:var(--red);
}
.nav-item.logout:hover{
  background:rgba(239,68,68,.1);
  color:var(--red);
}
.nav-item.logout svg{
  stroke:var(--red);
}

/* MAIN CONTENT */
.main-content{
  flex:1;
  margin-left:260px;
  min-height:100vh;
  padding:24px 32px;
}
.welcome-header{
  margin-bottom:32px;
}
.welcome-header h1{
  font-size:1.8rem;
  font-weight:700;
  color:var(--white);
  letter-spacing:-1px;
}
.welcome-header p{
  color:var(--muted2);
  font-size:.85rem;
  margin-top:6px;
}

/* PANEL */
.panel{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:24px;
  max-width:100%;
}
.panel-header{
  padding:16px 22px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.ph-icon{
  width:32px;
  height:32px;
  border-radius:8px;
  background:var(--card2);
  border:1px solid var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.ph-icon svg{
  width:15px;
  height:15px;
  stroke:var(--muted2);
}
.ph-title{
  font-size:.88rem;
  font-weight:600;
  color:var(--white);
}
.ph-sub{
  font-size:.68rem;
  color:var(--muted);
  font-family:var(--mono);
}
.panel-body{
  padding:20px;
}

/* FORM */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:.7rem;font-weight:500;color:var(--muted2);margin-bottom:6px;font-family:var(--mono);letter-spacing:.3px}
input,textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:.58rem .85rem;color:var(--text);font-family:var(--mono);font-size:.78rem;
  outline:none;transition:border-color .2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:100px}

/* INFO BOX */
.info-box{
  background:rgba(168,85,247,.08);
  border:1px solid rgba(168,85,247,.15);
  border-radius:10px;
  padding:11px 13px;
  margin-bottom:14px;
  display:flex;
  align-items:flex-start;
  gap:8px;
}
.info-box svg{
  width:14px;
  height:14px;
  stroke:var(--purple);
  flex-shrink:0;
}
.info-box span{
  font-size:.7rem;
  color:var(--muted2);
  font-family:var(--mono);
  line-height:1.6;
}

/* BUTTON */
.btn{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  font-size:.8rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  font-family:var(--font);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(168,85,247,.4);
  filter:brightness(1.05);
}
.btn-danger{
  background:linear-gradient(135deg,var(--red),#dc2626);
  color:#fff;
}
.btn-danger:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(239,68,68,.4);
  filter:brightness(1.05);
}
.btn-secondary{
  background:var(--card2);
  border:1px solid var(--border2);
  color:var(--white);
}
.btn-secondary:hover{
  background:var(--card);
  border-color:var(--purple);
}
.btn-sm{
  padding:6px 12px;
  font-size:.7rem;
  width:auto;
}

/* PRICE GRID */
.price-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.price-field .price-input{
  width:100%;
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:.5rem .7rem;
  color:var(--text);
  font-family:var(--mono);
  font-size:.7rem;
  outline:none;
}
.price-field .price-input:focus{border-color:var(--purple)}
.price-field label{
  font-size:.6rem;
  color:var(--muted2);
  margin-bottom:4px;
}

/* DISCOUNT GRID */
.discount-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  margin-top:12px;
}
.discount-card{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:12px;
}
.discount-code{
  font-family:var(--mono);
  font-size:.75rem;
  font-weight:700;
  color:var(--purple);
  background:rgba(168,85,247,.1);
  padding:4px 8px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:8px;
}
.discount-percent{
  font-size:.9rem;
  font-weight:700;
  color:var(--white);
}
.discount-uses{
  font-size:.65rem;
  color:var(--muted);
  margin-top:8px;
}
.discount-expired{
  font-size:.6rem;
  color:var(--red);
}
.discount-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
}

/* ID GRID */
.id-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;
  margin-top:12px;
}
.id-card{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.id-code{
  font-family:var(--mono);
  font-size:.72rem;
  color:var(--text);
  word-break:break-all;
}
.id-status{
  font-size:.55rem;
  font-weight:600;
  padding:.12rem .4rem;
  border-radius:4px;
  width:fit-content;
  margin-top:6px;
}
.status-available{
  background:rgba(16,185,129,.1);
  color:#10b981;
}
.status-sold{
  background:rgba(239,68,68,.1);
  color:#ef4444;
}
.id-actions{
  display:flex;
  gap:6px;
  margin-top:6px;
}
.id-btn{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:.3rem .6rem;
  font-size:.65rem;
  cursor:pointer;
  transition:all .15s;
  color:var(--muted2);
  font-weight:500;
}
.id-btn:hover{
  color:var(--white);
  border-color:var(--purple);
}
.id-btn-danger{
  background:rgba(239,68,68,.1);
  border-color:rgba(239,68,68,.3);
  color:var(--red);
}
.id-btn-danger:hover{
  background:rgba(239,68,68,.2);
  border-color:var(--red);
  color:var(--red);
}

/* SECTION HEADER */
.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 0 12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.section-header h3{
  font-size:.85rem;
  font-weight:600;
  color:var(--white);
}
.section-header span{
  font-size:.65rem;
  color:var(--muted);
  font-family:var(--mono);
}

/* SEARCH BAR */
.search-bar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.search-bar input{
  flex:1;
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:.6rem .9rem;
  color:var(--text);
  font-family:var(--mono);
  font-size:.78rem;
  outline:none;
}
.search-bar input:focus{border-color:var(--purple)}
.search-bar button{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border:none;
  border-radius:10px;
  padding:0 16px;
  cursor:pointer;
  color:#fff;
  font-weight:600;
}

/* AUTO DETECT RESULT */
.auto-detect-result{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:12px;
  margin-top:12px;
}
.auto-detect-result .title{
  font-size:.68rem;
  color:var(--muted2);
  margin-bottom:8px;
}
.auto-detect-result .tier-row{
  font-size:.65rem;
  margin-bottom:4px;
}
.auto-detect-result .low{color:#9ca3af}
.auto-detect-result .medium{color:#60a5fa}
.auto-detect-result .high{color:#fb923c}
.auto-detect-result .legend{color:#fbbf24}

/* PROFILE AVATAR */
.profile-avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--border2);
  margin-bottom:12px;
}
.avatar-wrapper{
  display:flex;
  justify-content:center;
  margin-bottom:16px;
}

/* STAT CARD */
.stat-card{
  background:var(--card2);
  border-radius:12px;
  padding:16px;
  text-align:center;
}
.stat-number{
  font-size:1.5rem;
  font-weight:700;
  color:var(--white);
}
.stat-label{
  font-size:.65rem;
  color:var(--muted);
}

/* NOTIFICATION */
.notification{
  position:fixed;
  bottom:24px;
  right:24px;
  background:var(--card2);
  border-radius:16px;
  padding:0;
  width:360px;
  max-width:calc(100vw - 48px);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  transform:translateY(100px);
  opacity:0;
  transition:all .3s ease;
  z-index:1000;
  overflow:hidden;
  pointer-events:none;
}
.notification.show{
  transform:translateY(0);
  opacity:1;
  pointer-events:auto;
}
.notification-content{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
}
.notification-icon{
  width:40px;
  height:40px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.notification-icon.success{background:rgba(16,185,129,.15)}
.notification-icon.error{background:rgba(239,68,68,.15)}
.notification-icon.warning{background:rgba(245,158,11,.15)}
.notification-icon svg{width:22px;height:22px}
.notification-icon.success svg{stroke:var(--green)}
.notification-icon.error svg{stroke:var(--red)}
.notification-icon.warning svg{stroke:var(--yellow)}
.notification-text{flex:1}
.notification-title{
  font-size:.85rem;
  font-weight:600;
  color:var(--white);
  margin-bottom:2px;
}
.notification-message{
  font-size:.7rem;
  color:var(--muted2);
  line-height:1.4;
}
.notification-progress{
  height:3px;
  width:100%;
  background:rgba(255,255,255,.05);
}
.notification-progress-bar{
  height:100%;
  width:100%;
  transition:width 3s linear;
}
.notification-progress-bar.success{background:linear-gradient(90deg,var(--green),#34d399)}
.notification-progress-bar.error{background:linear-gradient(90deg,var(--red),#f87171)}
.notification-progress-bar.warning{background:linear-gradient(90deg,var(--yellow),#fbbf24)}
.notification-close{
  width:28px;
  height:28px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
}
.notification-close:hover{background:rgba(255,255,255,.1)}
.notification-close svg{width:14px;height:14px;stroke:var(--muted2)}

.progress-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  display:none;
}
.progress-overlay.show{display:flex}
.progress-card{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:32px;
  text-align:center;
}
.progress-spinner{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid var(--border2);
  border-top-color:var(--purple);
  animation:spin .7s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{
  height:1px;
  background:var(--border);
  margin:16px 0;
}

/* RESPONSIVE */
.menu-toggle{
  display:none;
  position:fixed;
  top:16px;
  left:16px;
  z-index:201;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:10px;
  cursor:pointer;
}
.sidebar-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.7);
  z-index:98;
}

@media(max-width:768px){
  .sidebar{
    transform:translateX(-100%);
    width:80%;
    max-width:280px;
    z-index:99;
  }
  .sidebar.open{
    transform:translateX(0);
  }
  .sidebar-overlay.show{
    display:block;
  }
  .main-content{
    margin-left:0;
    padding:70px 16px 20px;
  }
  .menu-toggle{
    display:block;
  }
  .welcome-header h1{
    font-size:1.4rem;
  }
  .price-grid, .discount-grid{
    grid-template-columns:1fr;
  }
  .notification{
    width:300px;
    right:16px;
    bottom:16px;
  }
  .id-grid{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">ID</div>
      <span>IDglitxh</span>
    </div>
  </div>
  <div class="sidebar-nav">
    <button class="nav-item" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard

    </button>
    <button class="nav-item" data-page="harga">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 2v4M12 22v-4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      Harga
    </button>
    <button class="nav-item" data-page="profile">

      Logout
    </button>

</div>

<!-- OVERLAY untuk mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- MENU TOGGLE (mobile) -->
<div class="menu-toggle" id="menuToggle">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--white)" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
  <div class="welcome-header">
    <h1>Hello, <span id="welcomeName">---</span></h1>
    <p id="userBio">Selamat datang di dashboard Anda</p>
  </div>
  <div id="pageContent"></div>
</div>

<!-- NOTIFICATION -->
<div class="notification" id="notification">
  <div class="notification-content">
    <div class="notification-icon" id="notificationIcon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="notification-text">
      <div class="notification-title" id="notificationTitle">Success!</div>
      <div class="notification-message" id="notificationMessage">Operation completed</div>
    </div>
    <div class="notification-close" onclick="hideNotification()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div class="notification-progress">
    <div class="notification-progress-bar" id="notificationProgress"></div>
  </div>
</div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-card">
    <div class="progress-spinner"></div>
    <div class="progress-title" id="progressTitle">Menyimpan...</div>
  </div>
</div>

<script>
// ==================== KONFIGURASI ====================
const API_URL = '/api';
let currentUser = null;
let currentPage = 'dashboard';
let allMyIdsData = [];
let availableIdsData = [];
let soldIdsData = [];
let searchQuery = '';
let notificationTimer = null;
let myDiscounts = [];

// ==================== NOTIFICATION ====================
function showNotification(type, title, message) {
  const notification = document.getElementById('notification');
  const iconDiv = document.getElementById('notificationIcon');
  const titleDiv = document.getElementById('notificationTitle');
  const msgDiv = document.getElementById('notificationMessage');
  const progressBar = document.getElementById('notificationProgress');
  
  if (notificationTimer) clearTimeout(notificationTimer);
  
  notification.classList.remove('show');
  
  setTimeout(() => {
    if (type === 'success') {
      iconDiv.className = 'notification-icon success';
      iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>`;
      progressBar.className = 'notification-progress-bar success';
    } else if (type === 'error') {
      iconDiv.className = 'notification-icon error';
      iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
      progressBar.className = 'notification-progress-bar error';
    } else {
      iconDiv.className = 'notification-icon warning';
      iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12} y1="8" x2="12} y2="12"/><line x1="12} y1="16" x2="12.01} y2="16"/></svg>`;
      progressBar.className = 'notification-progress-bar warning';
    }
    
    titleDiv.textContent = title;
    msgDiv.textContent = message;
    progressBar.style.width = '100%';
    notification.classList.add('show');
    
    setTimeout(() => { progressBar.style.width = '0%'; }, 100);
    
    notificationTimer = setTimeout(() => {
      hideNotification();
    }, 3500);
  }, 50);
}

function hideNotification() {
  const notification = document.getElementById('notification');
  notification.classList.remove('show');
  if (notificationTimer) clearTimeout(notificationTimer);
}

// ==================== API CALLS ====================
async function callAPI(endpoint, method, body = null) {
  const options = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) options.body = JSON.stringify(body);
  const response = await fetch(`${API_URL}/${endpoint}`, options);
  return await response.json();
}

function showProgress(show, title = 'Processing...') {
  if (show) {
    document.getElementById('progressTitle').textContent = title;
    document.getElementById('progressOverlay').classList.add('show');
  } else {
    document.getElementById('progressOverlay').classList.remove('show');
  }
}

// ==================== DETEKSI TIER ====================
function detectTierFromID(id) {
  const idStr = String(id);
  let sequences = [];
  let currentChar = idStr[0];
  let currentLength = 1;
  
  for (let i = 1; i < idStr.length; i++) {
    if (idStr[i] === currentChar) {
      currentLength++;
    } else {
      if (currentLength >= 2) sequences.push(currentLength);
      currentChar = idStr[i];
      currentLength = 1;
    }
  }
  if (currentLength >= 2) sequences.push(currentLength);
  sequences.sort((a, b) => b - a);
  
  if (sequences.length === 0) return 'low';
  const maxLen = sequences[0];
  if (maxLen >= 9) return 'legend';
  if (maxLen >= 6) {
    const hasSecondBig = sequences.slice(1).some(len => len >= 4);
    if (hasSecondBig) return 'high';
    return 'medium';
  }
  if (maxLen >= 5) return 'medium';
  const countLen4OrMore = sequences.filter(len => len >= 4).length;
  if (countLen4OrMore >= 2) return 'medium';
  return 'low';
}

// ==================== MY IDS FUNCTIONS ====================
async function loadMyIdsData() {
  try {
    showProgress(true, 'Memuat ID...');
    const result = await callAPI(`my-ids?username=${currentUser.username}`, 'GET');
    showProgress(false);
    
    if (result.success && result.data) {
      allMyIdsData = result.data;
      availableIdsData = allMyIdsData.filter(item => !item.isSold);
      soldIdsData = allMyIdsData.filter(item => item.isSold === true);
      
      const countSpan = document.getElementById('myIdsCount');
      if (countSpan) countSpan.textContent = `${allMyIdsData.length} ID (${soldIdsData.length} sold)`;
      
      updateMyIdsDisplay();
    } else {
      availableIdsData = [];
      soldIdsData = [];
      updateMyIdsDisplay();
    }
  } catch(e) {
    showProgress(false);
    console.error('Load my IDs error:', e);
    availableIdsData = [];
    soldIdsData = [];
    updateMyIdsDisplay();
  }
}

function updateMyIdsDisplay() {
  const availableSection = document.getElementById('availableSection');
  const soldSection = document.getElementById('soldSection');
  const availableCountSpan = document.getElementById('availableCount');
  const soldCountSpan = document.getElementById('soldCount');
  
  if (availableCountSpan) availableCountSpan.textContent = `${availableIdsData.length} ID`;
  if (soldCountSpan) soldCountSpan.textContent = `${soldIdsData.length} ID`;
  
  if (availableSection) availableSection.style.display = availableIdsData.length > 0 ? 'block' : 'none';
  if (soldSection) soldSection.style.display = soldIdsData.length > 0 ? 'block' : 'none';
  
  renderAllAvailableIds(availableIdsData);
  renderAllSoldIds(soldIdsData);
}

function renderAllAvailableIds(ids) {
  const container = document.getElementById('availableContainer');
  if (!container) return;
  
  if (ids.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)">Tidak ada ID available</div>';
    return;
  }
  
  container.innerHTML = `
    <div class="id-grid">
      ${ids.map(item => `
        <div class="id-card">
          <div class="id-code">${escapeHtml(item.id)}</div>
          <div class="id-status status-available">AVAILABLE</div>
          <div class="id-actions">
            <button class="id-btn" onclick="markAsSold('${escapeHtml(item.id)}', '${item.tier || detectTierFromID(item.id)}')">📦 Mark Sold</button>
            <button class="id-btn id-btn-danger" onclick="deleteSingleId('${escapeHtml(item.id)}')">🗑️ Hapus</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderAllSoldIds(ids) {
  const container = document.getElementById('soldContainer');
  if (!container) return;
  
  if (ids.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)">Belum ada ID sold</div>';
    return;
  }
  
  container.innerHTML = `
    <div class="id-grid">
      ${ids.map(item => `
        <div class="id-card">
          <div class="id-code">${escapeHtml(item.id)}</div>
          <div class="id-status status-sold">SOLD</div>
          <div class="id-actions">
            <span style="font-size:.6rem;color:var(--muted);padding:4px 0;display:block">Tier: ${(item.tier || 'unknown').toUpperCase()}</span>
            <button class="id-btn id-btn-danger" onclick="deleteSingleId('${escapeHtml(item.id)}')">🗑️ Hapus</button>
          </div>
        </div>
      `).join('')}

  `;
}

function searchMyIds() {
  const query = document.getElementById('searchIdInput')?.value.trim().toLowerCase() || '';
  if (!query) {
    updateMyIdsDisplay();
    return;
  }
  const filteredAvailable = availableIdsData.filter(item => item.id.toLowerCase().includes(query));
  const filteredSold = soldIdsData.filter(item => item.id.toLowerCase().includes(query));
  
  const containerAvailable = document.getElementById('availableContainer');
  const containerSold = document.getElementById('soldContainer');
  const noResult = document.getElementById('noResultMessage');
  
  if (containerAvailable) renderAllAvailableIds(filteredAvailable);
  if (containerSold) renderAllSoldIds(filteredSold);
  
  if (noResult) {
    if (filteredAvailable.length === 0 && filteredSold.length === 0) {
      noResult.style.display = 'block';
    } else {
      noResult.style.display = 'none';
    }
  }
}

async function markAsSold(id, tier) {
  if (!confirm(`Tandai ID ${id} sebagai sold?`)) return;
  showProgress(true, 'Memproses...');
  const result = await callAPI('sold', 'POST', { username: currentUser.username, soldIds: [id], tier: tier });
  showProgress(false);
  
  if (result.success) {
    currentUser.soldTotal = (currentUser.soldTotal || 0) + 1;
    currentUser.total = (currentUser.total || 0) - 1;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    showNotification('success', 'Berhasil!', `${id} ditandai sold`);
    await loadMyIdsData();
  } else {
    showNotification('error', 'Gagal', 'Gagal menandai sold');
  }
}

// ==================== DELETE ID FUNCTIONS ====================
async function deleteSingleId(id) {
  if (!confirm(`⚠️ PERINGATAN!\n\nID ${id} akan dihapus PERMANEN dari:\n• Koleksi ID Anda\n• Koleksi Global (Low/Medium/High/Legend)\n• Koleksi Sold (jika ada)\n\nTindakan ini TIDAK DAPAT DIBATALKAN!\n\nYakin ingin menghapus?`)) return;
  
  await executeDeleteIds([id]);
}

async function submitDeleteIDs() {
  let raw = document.getElementById('deleteIdList').value;
  if (!raw.trim()) {
    showNotification('error', 'Gagal', 'Masukkan ID yang akan dihapus');
    return;
  }
  
  const deleteIds = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (deleteIds.length === 0) return;
  
  if (!confirm(`⚠️ PERINGATAN!\n\nAnda akan menghapus ${deleteIds.length} ID secara PERMANEN.\n\nTindakan ini TIDAK DAPAT DIBATALKAN!\n\nYakin ingin melanjutkan?`)) return;
  
  await executeDeleteIds(deleteIds);
}

async function executeDeleteIds(deleteIds) {
  showProgress(true, `Menghapus ${deleteIds.length} ID...`);
  
  let deletedCount = 0;
  let failedCount = 0;
  const tierMap = { low: 'ids_low', medium: 'ids_medium', high: 'ids_high', legend: 'ids_legend' };
  
  for (const id of deleteIds) {
    try {
      const tier = detectTierFromID(id);
      
      await callAPI('delete-user-id', 'POST', { username: currentUser.username, id: id, tier: tier });
      
      if (tierMap[tier]) {
        await fetch(`${API_URL}/delete-global-id`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ collection: tierMap[tier], id: id })
        });
      }
      
      await fetch(`${API_URL}/delete-sold-id`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: currentUser.username, id: id })
      });
      
      await fetch(`${API_URL}/delete-sold-global`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id })
      });
      
      deletedCount++;
    } catch(e) {
      console.error(`Failed to delete ${id}:`, e);
      failedCount++;
    }
  }
  
  const stillAvailable = availableIdsData.filter(item => !deleteIds.includes(item.id));
  const stillSold = soldIdsData.filter(item => !deleteIds.includes(item.id));
  
  currentUser.total = stillAvailable.length;
  currentUser.soldTotal = stillSold.length;
  localStorage.setItem('contributor_user', JSON.stringify(currentUser));
  
  showProgress(false);
  
  if (failedCount === 0) {
    showNotification('success', 'Berhasil!', `${deletedCount} ID berhasil dihapus permanen.`);
    document.getElementById('deleteIdList').value = '';
    await loadMyIdsData();
  } else {
    showNotification('error', 'Gagal', `${deletedCount} ID terhapus, ${failedCount} ID gagal dihapus.`);
  }
}

function previewAutoDetect() {
  const raw = document.getElementById('addIdList')?.value;
  if (!raw || !raw.trim()) {
    const resultDiv = document.getElementById('autoDetectResult');
    if (resultDiv) resultDiv.style.display = 'none';
    return;
  }
  
  const cleanRaw = raw.replace(/[^0-9\n]/g, '');
  const ids = cleanRaw.split('\n').map(l => l.trim()).filter(Boolean);
  
  if (ids.length === 0) {
    document.getElementById('autoDetectResult').style.display = 'none';
    return;
  }
  
  const tierGroups = { low: 0, medium: 0, high: 0, legend: 0 };
  for (const id of ids) {
    const tier = detectTierFromID(id);
    tierGroups[tier]++;
  }
  const resultDiv = document.getElementById('autoDetectResult');
  if (resultDiv) {
    let warningHtml = '';
    if (ids.length > 25) {
      warningHtml = '<div class="tier-row" style="color:var(--red); margin-bottom:8px">⚠️ Maksimal 25 ID dalam satu kali tambah! Kelebihan ID akan diabaikan.</div>';
    }
    resultDiv.innerHTML = `
      <div class="title">📊 Hasil Deteksi:</div>
      ${warningHtml}
      <div class="tier-row low">🔵 LOW: ${tierGroups.low} ID</div>
      <div class="tier-row medium">🟢 MEDIUM: ${tierGroups.medium} ID</div>
      <div class="tier-row high">🟠 HIGH: ${tierGroups.high} ID</div>
      <div class="tier-row legend">🟣 LEGEND: ${tierGroups.legend} ID</div>
      <div class="tier-row" style="margin-top:6px;color:var(--muted2)">📊 Total: ${ids.length} ID ${ids.length > 25 ? '(Max 25)' : ''}</div>
    `;
    resultDiv.style.display = 'block';
  }
}

function filterNumbersOnly() {
  const textarea = document.getElementById('addIdList');
  if (textarea) {
    const raw = textarea.value;
    const filtered = raw.replace(/[^0-9\n]/g, '');
    if (raw !== filtered) {
      textarea.value = filtered;
      showNotification('warning', 'Perhatian', 'Hanya angka yang diperbolehkan!');
    }
    previewAutoDetect();
  }
}

async function submitAddIDs() {
  let raw = document.getElementById('addIdList').value;
  
  const filteredRaw = raw.replace(/[^0-9\n]/g, '');
  if (raw !== filteredRaw) {
    document.getElementById('addIdList').value = filteredRaw;
    raw = filteredRaw;
    showNotification('warning', 'Perhatian', 'Hanya angka yang diperbolehkan!');
  }
  
  if (!raw.trim()) { 
    showNotification('error', 'Gagal', 'Daftar ID kosong'); 
    return; 
  }
  
  const newIDs = [...new Set(raw.split('\n').map(l => l.trim()).filter(Boolean))];
  if (newIDs.length === 0) return;
  
  const MAX_IDS = 25;
  let idsToProcess = newIDs;
  let skippedCount = 0;
  
  if (newIDs.length > MAX_IDS) {
    idsToProcess = newIDs.slice(0, MAX_IDS);
    skippedCount = newIDs.length - MAX_IDS;
    showNotification('warning', 'Perhatian', `Maksimal ${MAX_IDS} ID per submit. ${skippedCount} ID tidak diproses.`);
  }
  
  const invalidIDs = idsToProcess.filter(id => !/^\d+$/.test(id));
  if (invalidIDs.length > 0) {
    showNotification('error', 'Gagal', `ID tidak valid: ${invalidIDs.slice(0,3).join(', ')}`);
    return;
  }
  
  showProgress(true, `Memproses ${idsToProcess.length} ID...`);
  const idsByTier = { low: [], medium: [], high: [], legend: [] };
  for (const id of idsToProcess) {
    const tier = detectTierFromID(id);
    idsByTier[tier].push(id);
  }
  
  let allSuccess = true;
  let totalAdded = 0;
  for (const [tier, ids] of Object.entries(idsByTier)) {
    if (ids.length === 0) continue;
    const result = await callAPI('ids', 'POST', { username: currentUser.username, tier: tier, ids: ids });
    if (!result.success) allSuccess = false;
    else totalAdded += ids.length;
  }
  
  showProgress(false);
  
  if (allSuccess && totalAdded > 0) {
    currentUser.total = (currentUser.total || 0) + totalAdded;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    
    let message = `✅ ${totalAdded} ID berhasil ditambahkan!`;
    if (skippedCount > 0) message += ` (${skippedCount} ID diabaikan)`;
    
    showNotification('success', 'Berhasil!', message);
    document.getElementById('addIdList').value = '';
    document.getElementById('autoDetectResult').innerHTML = '';
    document.getElementById('autoDetectResult').style.display = 'none';
    await loadMyIdsData();
  } else if (totalAdded === 0) {
    showNotification('error', 'Gagal', 'Tidak ada ID yang berhasil ditambahkan');
  } else {
    showNotification('error', 'Gagal', 'Sebagian ID gagal ditambahkan');
  }
}

// ==================== HARGA FUNCTIONS ====================
async function saveHarga() {
  const low = parseInt(document.getElementById('priceLow').value) || 500;
  const medium = parseInt(document.getElementById('priceMedium').value) || 10000;
  const high = parseInt(document.getElementById('priceHigh').value) || 15000;
  const legend = parseInt(document.getElementById('priceLegend').value) || 30000;
  
  showProgress(true, 'Menyimpan harga...');
  const result = await callAPI('update-price', 'POST', {
    username: currentUser.username,
    prices: { low, medium, high, legend }
  });
  showProgress(false);
  
  if (result.success) {
    currentUser.price = { low, medium, high, legend };
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    showNotification('success', 'Berhasil!', 'Harga berhasil diupdate!');
  } else {
    showNotification('error', 'Gagal', 'Gagal update harga');
  }
}

// ==================== DISKON FUNCTIONS ====================
async function loadMyDiscounts() {
  try {
    const result = await callAPI(`my-discounts?username=${currentUser.username}`, 'GET');
    if (result.success && result.data) {
      myDiscounts = result.data;
      renderDiscountList();
    }
  } catch(e) {
    console.error('Load discounts error:', e);
  }
}

function renderDiscountList() {
  const container = document.getElementById('discountListContainer');
  const countSpan = document.getElementById('discountCount');
  
  if (!container) return;
  
  if (countSpan) countSpan.textContent = `${myDiscounts.length} kode`;
  
  if (myDiscounts.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">Belum ada kode diskon. Buat kode di atas!</div>';
    return;
  }
  
  container.innerHTML = `
    <div class="discount-grid">
      ${myDiscounts.map(d => {
        const isExpired = new Date() > new Date(d.expiresAt);
        const remaining = d.maxUses - d.usedCount;
        return `
          <div class="discount-card">
            <div class="discount-code">${escapeHtml(d.code)}</div>
            <div class="discount-percent">💰 ${d.discountPercent}% OFF</div>
            <div class="discount-uses">📊 Digunakan: ${d.usedCount} / ${d.maxUses} kali</div>
            <div class="discount-uses">📅 Berlaku hingga: ${new Date(d.expiresAt).toLocaleDateString('id-ID')}</div>
            ${remaining > 0 ? `<div class="discount-uses">✅ Sisa kuota: ${remaining}</div>` : '<div class="discount-expired">⚠️ Kuota habis</div>'}
            ${isExpired ? '<div class="discount-expired">⏰ Sudah kadaluarsa</div>' : ''}
            <div class="discount-actions">
              <button class="btn btn-sm btn-secondary" onclick="copyDiscountCode('${d.code}')">📋 Copy</button>
              <button class="btn btn-sm btn-danger" onclick="deleteDiscount('${d.code}')">🗑️ Hapus</button>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

async function createDiscount() {
  const code = document.getElementById('discountCode').value.trim().toUpperCase();
  const discountPercent = parseInt(document.getElementById('discountPercent').value);
  const maxUses = parseInt(document.getElementById('discountMaxUses').value);
  
  if (!code) {
    showNotification('error', 'Gagal', 'Masukkan kode diskon');
    return;
  }
  
  if (code.length < 3) {
    showNotification('error', 'Gagal', 'Kode diskon minimal 3 karakter');
    return;
  }
  
  if (!/^[A-Z0-9]+$/.test(code)) {
    showNotification('error', 'Gagal', 'Kode diskon hanya boleh huruf besar dan angka');
    return;
  }
  
  showProgress(true, 'Membuat kode diskon...');
  const result = await callAPI('create-discount', 'POST', {
    username: currentUser.username,
    code: code,
    discountPercent: discountPercent,
    maxUses: maxUses
  });
  showProgress(false);
  
  if (result.success) {
    showNotification('success', 'Berhasil!', `Kode ${code} berhasil dibuat!`);
    document.getElementById('discountCode').value = '';
    await loadMyDiscounts();
  } else {
    showNotification('error', 'Gagal', result.error || 'Gagal membuat kode diskon');
  }
}

async function deleteDiscount(code) {
  if (!confirm(`Hapus kode diskon ${code}?`)) return;
  
  showProgress(true, 'Menghapus kode diskon...');
  const result = await callAPI('delete-discount', 'POST', {
    code: code,
    username: currentUser.username
  });
  showProgress(false);
  
  if (result.success) {
    showNotification('success', 'Berhasil!', `Kode ${code} berhasil dihapus`);
    await loadMyDiscounts();
  } else {
    showNotification('error', 'Gagal', result.error || 'Gagal menghapus kode diskon');
  }
}

function copyDiscountCode(code) {
  navigator.clipboard.writeText(code);
  showNotification('success', 'Berhasil!', `Kode ${code} disalin ke clipboard`);
}

// ==================== PROFILE FUNCTIONS ====================
async function saveProfile() {
  const photo = document.getElementById('editPhoto').value.trim();
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  const wa = document.getElementById('editWhatsapp').value.trim();
  
  if (!name) { showNotification('error', 'Gagal', 'Nama tidak boleh kosong'); return; }
  
  showProgress(true, 'Menyimpan profile...');
  const result = await callAPI('profile', 'POST', { username: currentUser.username, name, photo, bio, wa });
  showProgress(false);
  
  if (result.success) {
    currentUser.name = name;
    currentUser.photo = photo;
    currentUser.bio = bio;
    currentUser.wa = wa;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    document.getElementById('welcomeName').textContent = name;
    showNotification('success', 'Berhasil!', 'Profile berhasil diupdate!');
    if (currentPage === 'profile') {
      document.getElementById('profileAvatar').src = photo;
    }
  } else {
    showNotification('error', 'Gagal', 'Gagal update profile');
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// ==================== RENDER PAGE ====================
async function renderPage(page) {
  currentPage = page;
  const contentDiv = document.getElementById('pageContent');
  const navItems = document.querySelectorAll('.nav-item[data-page]');
  navItems.forEach(item => {
    if (item.getAttribute('data-page') === page) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
  
  switch(page) {
    case 'dashboard':
      contentDiv.innerHTML = renderDashboardPage();
      break;
    case 'addid':
      contentDiv.innerHTML = renderAddIdPage();
      const addTextarea = document.getElementById('addIdList');
      if (addTextarea) {
        addTextarea.addEventListener('input', filterNumbersOnly);
      }
      break;
    case 'myids':
      contentDiv.innerHTML = renderMyIdsPage();
      await loadMyIdsData();
      const searchInput = document.getElementById('searchIdInput');
      if (searchInput) {
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchMyIds(); });
      }
      break;
    case 'harga':
      contentDiv.innerHTML = renderHargaPage();
      await loadMyDiscounts();
      break;
    case 'profile':
      contentDiv.innerHTML = renderProfilePage();
      break;
  }
}

// ==================== LOGOUT ====================
function logout() {
  localStorage.removeItem('contributor_user');
  window.location.href = '../login/login.html';
}

// ==================== INIT & NAVIGATION ====================
function initNavigation() {
  const navItems = document.querySelectorAll('.nav-item[data-page]');
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const page = item.getAttribute('data-page');
      renderPage(page);
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
      }
    });
  });
  
  document.getElementById('logoutBtn').addEventListener('click', logout);
  
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  
  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });
  }
  
  if (overlay) {
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });
  }
}

// ==================== START ====================
(async () => {
  if (!checkAuth()) return;
  initNavigation();
  await renderPage('dashboard');
})();
</script>
