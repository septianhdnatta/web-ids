<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --sidebar:#0a0a0a;
  --card:#161616;
  --card2:#1a1a1a;
  --border:#232323;
  --border2:#2a2a2a;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#888;
  --white:#fff;
  --purple:#a855f7;
  --pink:#ec4899;
  --green:#10b981;
  --red:#ef4444;
  --yellow:#f59e0b;
  --font:'Inter',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
}

/* ==================== SIDEBAR STYLE (VERCEL LIKE) ==================== */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  width:260px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:100;
  transition:transform .3s ease;
}
.sidebar-header{
  padding:20px 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.sidebar-logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:1rem;
  font-weight:700;
  color:var(--white);
  text-decoration:none;
}
.sidebar-logo-icon{
  width:28px;
  height:28px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
  color:#fff;
  font-weight:900;
}
.sidebar-nav{
  flex:1;
  padding:0 12px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:10px;
  color:var(--muted2);
  font-size:.85rem;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:4px;
  width:100%;
  background:none;
  border:none;
  text-align:left;
}
.nav-item svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  stroke-width:1.5;
  flex-shrink:0;
}
.nav-item:hover{
  background:rgba(255,255,255,.05);
  color:var(--white);
}
.nav-item.active{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;
}
.nav-item.logout{
  margin-top:auto;
  color:var(--red);
}
.nav-item.logout:hover{
  background:rgba(239,68,68,.1);
  color:var(--red);
}
.nav-item.logout svg{
  stroke:var(--red);
}

/* ==================== MAIN CONTENT ==================== */
.main-content{
  flex:1;
  margin-left:260px;
  min-height:100vh;
  padding:24px 32px;
}
.welcome-header{
  margin-bottom:32px;
}
.welcome-header h1{
  font-size:1.8rem;
  font-weight:700;
  color:var(--white);
  letter-spacing:-1px;
}
.welcome-header p{
  color:var(--muted2);
  font-size:.85rem;
  margin-top:6px;
}

/* PANEL */
.panel{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:24px;
  max-width:800px;
}
.panel-header{
  padding:16px 22px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.ph-icon{
  width:32px;
  height:32px;
  border-radius:8px;
  background:var(--card2);
  border:1px solid var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.ph-icon svg{
  width:15px;
  height:15px;
  stroke:var(--muted2);
}
.ph-title{
  font-size:.88rem;
  font-weight:600;
  color:var(--white);
}
.ph-sub{
  font-size:.68rem;
  color:var(--muted);
  font-family:var(--mono);
}
.panel-body{
  padding:20px;
}

/* FORM */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:.7rem;font-weight:500;color:var(--muted2);margin-bottom:6px;font-family:var(--mono);letter-spacing:.3px}
input,textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:.58rem .85rem;color:var(--text);font-family:var(--mono);font-size:.78rem;
  outline:none;transition:border-color .2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:100px}

/* INFO BOX */
.info-box{
  background:rgba(168,85,247,.08);
  border:1px solid rgba(168,85,247,.15);
  border-radius:10px;
  padding:11px 13px;
  margin-bottom:14px;
  display:flex;
  align-items:flex-start;
  gap:8px;
}
.info-box svg{
  width:14px;
  height:14px;
  stroke:var(--purple);
  flex-shrink:0;
}
.info-box span{
  font-size:.7rem;
  color:var(--muted2);
  font-family:var(--mono);
  line-height:1.6;
}

/* BUTTON */
.btn{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  font-size:.8rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  font-family:var(--font);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(168,85,247,.4);
  filter:brightness(1.05);
}
.btn-secondary{
  background:var(--card2);
  border:1px solid var(--border2);
  color:var(--white);
}
.btn-secondary:hover{
  background:var(--card);
  border-color:var(--purple);
}

/* PRICE GRID */
.price-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.price-field .price-input{
  width:100%;
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:.5rem .7rem;
  color:var(--text);
  font-family:var(--mono);
  font-size:.7rem;
  outline:none;
}
.price-field .price-input:focus{border-color:var(--purple)}
.price-field label{
  font-size:.6rem;
  color:var(--muted2);
  margin-bottom:4px;
}

/* ID GRID */
.id-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;
  margin-top:12px;
}
.id-card{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.id-code{
  font-family:var(--mono);
  font-size:.72rem;
  color:var(--text);
  word-break:break-all;
}
.id-status{
  font-size:.55rem;
  font-weight:600;
  padding:.12rem .4rem;
  border-radius:4px;
  width:fit-content;
  margin-top:6px;
}
.status-available{
  background:rgba(16,185,129,.1);
  color:#10b981;
}
.status-sold{
  background:rgba(239,68,68,.1);
  color:#ef4444;
}
.id-actions{
  display:flex;
  gap:6px;
  margin-top:6px;
}
.id-btn{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:.3rem .6rem;
  font-size:.65rem;
  cursor:pointer;
  transition:all .15s;
  color:var(--muted2);
  font-weight:500;
}
.id-btn:hover{
  color:var(--white);
  border-color:var(--purple);
}

/* SECTION HEADER */
.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 0 12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.section-header h3{
  font-size:.85rem;
  font-weight:600;
  color:var(--white);
}
.section-header span{
  font-size:.65rem;
  color:var(--muted);
  font-family:var(--mono);
}

/* SEARCH BAR */
.search-bar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.search-bar input{
  flex:1;
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:.6rem .9rem;
  color:var(--text);
  font-family:var(--mono);
  font-size:.78rem;
  outline:none;
}
.search-bar input:focus{border-color:var(--purple)}
.search-bar button{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border:none;
  border-radius:10px;
  padding:0 16px;
  cursor:pointer;
  color:#fff;
  font-weight:600;
}
.search-bar button:hover{
  filter:brightness(1.05);
  transform:translateY(-1px);
}

/* AUTO DETECT RESULT */
.auto-detect-result{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:12px;
  margin-top:12px;
}
.auto-detect-result .title{
  font-size:.68rem;
  color:var(--muted2);
  margin-bottom:8px;
}
.auto-detect-result .tier-row{
  font-size:.65rem;
  margin-bottom:4px;
}
.auto-detect-result .low{color:#9ca3af}
.auto-detect-result .medium{color:#60a5fa}
.auto-detect-result .high{color:#fb923c}
.auto-detect-result .legend{color:#fbbf24}

/* PAGINATION */
.pagination{
  display:flex;
  gap:4px;
  justify-content:center;
  margin-top:20px;
  flex-wrap:wrap;
}
.page-btn{
  min-width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  border:1px solid var(--border2);
  background:var(--card);
  font-size:.7rem;
  font-family:var(--mono);
  cursor:pointer;
  transition:all .15s;
  color:var(--muted);
  padding:0 8px;
}
.page-btn:hover{
  border-color:var(--purple);
  color:var(--white);
}
.page-btn.active{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-color:transparent;
  color:#fff;
  font-weight:700;
}

/* PROFILE AVATAR */
.profile-avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--border2);
  margin-bottom:12px;
}
.avatar-wrapper{
  display:flex;
  justify-content:center;
  margin-bottom:16px;
}

/* NOTIFICATION */
.notification{
  position:fixed;
  bottom:24px;
  right:24px;
  background:var(--card2);
  border-radius:16px;
  padding:0;
  width:360px;
  max-width:calc(100vw - 48px);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  transform:translateX(420px);
  transition:transform .4s;
  z-index:1000;
  overflow:hidden;
}
.notification.show{transform:translateX(0)}
.notification-content{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
}
.notification-icon{
  width:40px;
  height:40px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.notification-icon.success{background:rgba(16,185,129,.15)}
.notification-icon.error{background:rgba(239,68,68,.15)}
.notification-icon svg{width:22px;height:22px}
.notification-icon.success svg{stroke:var(--green)}
.notification-icon.error svg{stroke:var(--red)}
.notification-text{flex:1}
.notification-title{
  font-size:.85rem;
  font-weight:600;
  color:var(--white);
  margin-bottom:2px;
}
.notification-message{
  font-size:.7rem;
  color:var(--muted2);
  line-height:1.4;
}
.notification-progress{
  height:3px;
  width:100%;
  background:rgba(255,255,255,.05);
}
.notification-progress-bar{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,var(--green),#34d399);
  transition:width 3s linear;
}

.progress-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  display:none;
}
.progress-overlay.show{display:flex}
.progress-card{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:32px;
  text-align:center;
}
.progress-spinner{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid var(--border2);
  border-top-color:var(--purple);
  animation:spin .7s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{
  height:1px;
  background:var(--border);
  margin:16px 0;
}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{
    transform:translateX(-100%);
  }
  .sidebar.open{
    transform:translateX(0);
  }
  .main-content{
    margin-left:0;
    padding:20px 16px;
  }
  .menu-toggle{
    display:block;
    position:fixed;
    top:16px;
    left:16px;
    z-index:201;
    background:var(--card);
    border:1px solid var(--border2);
    border-radius:8px;
    padding:8px;
    cursor:pointer;
  }
  .price-grid{
    grid-template-columns:1fr;
  }
  .notification{
    width:300px;
  }
}

.menu-toggle{
  display:none;
}
</style>
</head>
<body>

<!-- SIDEBAR -->

  <div class="sidebar-header">

<!-- MENU TOGGLE (mobile) -->

<!-- MAIN CONTENT -->

<!-- NOTIFICATION -->

      <div class="notification-message" id="notificationMessage">Operation completed</div>

    <div class="notification-progress-bar" id="notificationProgress"></div>
  </div>
</div>

  <div class="progress-card">
    <div class="progress-spinner"></div>

<script>
// ==================== KONFIGURASI ====================
const API_URL = '/api';
let currentUser = null;
let currentPage = 'dashboard';
let allMyIdsData = [];
let availableIdsData = [];
let soldIdsData = [];
let availableCurrentPage = 1;
let searchQuery = '';
const ITEMS_PER_PAGE = 10;
let notificationTimer = null;

// ==================== NOTIFICATION ====================
function showNotification(type, title, message) {
  const notification = document.getElementById('notification');
  const iconDiv = document.getElementById('notificationIcon');
  const titleDiv = document.getElementById('notificationTitle');
  const msgDiv = document.getElementById('notificationMessage');
  const progressBar = document.getElementById('notificationProgress');
  
  if (type === 'success') {
    iconDiv.className = 'notification-icon success';
    iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>`;
    progressBar.className = 'notification-progress-bar';
  } else {
    iconDiv.className = 'notification-icon error';
    iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    progressBar.className = 'notification-progress-bar error';
  }
  
  titleDiv.textContent = title;
  msgDiv.textContent = message;
  progressBar.style.width = '100%';
  notification.classList.add('show');
  
  setTimeout(() => { progressBar.style.width = '0%'; }, 50);
  if (notificationTimer) clearTimeout(notificationTimer);
  notificationTimer = setTimeout(() => { notification.classList.remove('show'); }, 3500);
}

// ==================== AUTH ====================
function checkAuth() {
  const savedUser = localStorage.getItem('contributor_user');
  if (!savedUser) {
    window.location.href = '../login/login.html';
    return false;
  }
  currentUser = JSON.parse(savedUser);
  document.getElementById('welcomeName').textContent = currentUser.name;
  document.getElementById('userBio').textContent = currentUser.bio || 'Selamat datang di dashboard contributor';
  return true;
}

// ==================== API CALLS ====================
async function callAPI(endpoint, method, body = null) {
  const options = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) options.body = JSON.stringify(body);
  const response = await fetch(`${API_URL}/${endpoint}`, options);
  return await response.json();
}

function showProgress(show, title = 'Processing...') {
  if (show) {
    document.getElementById('progressTitle').textContent = title;
    document.getElementById('progressOverlay').classList.add('show');
  } else {
    document.getElementById('progressOverlay').classList.remove('show');
  }
}

// ==================== DETEKSI TIER ====================
function detectTierFromID(id) {
  const idStr = String(id);
  let sequences = [];
  let currentChar = idStr[0];
  let currentLength = 1;
  
  for (let i = 1; i < idStr.length; i++) {
    if (idStr[i] === currentChar) {
      currentLength++;
    } else {
      if (currentLength >= 2) sequences.push(currentLength);
      currentChar = idStr[i];
      currentLength = 1;
    }
  }
  if (currentLength >= 2) sequences.push(currentLength);
  sequences.sort((a, b) => b - a);
  
  if (sequences.length === 0) return 'low';
  const maxLen = sequences[0];
  if (maxLen >= 9) return 'legend';
  if (maxLen >= 6) {
    const hasSecondBig = sequences.slice(1).some(len => len >= 4);
    if (hasSecondBig) return 'high';
    return 'medium';
  }
  if (maxLen >= 5) return 'medium';
  const countLen4OrMore = sequences.filter(len => len >= 4).length;
  if (countLen4OrMore >= 2) return 'medium';
  return 'low';
}

// ==================== PAGE: DASHBOARD (HOME) ====================
function renderDashboardPage() {
  return `
    <div class="panel">
      <div class="panel-header">
        <div class="ph-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>

// ==================== FUNGSI SUPPORT ====================
async function loadMyIdsData() {
  try {
    const result = await callAPI(`my-ids?username=${currentUser.username}`, 'GET');
    if (result.success && result.data) {
      allMyIdsData = result.data;
      availableIdsData = allMyIdsData.filter(item => !item.isSold);
      soldIdsData = allMyIdsData.filter(item => item.isSold === true);
      document.getElementById('myIdsCount').textContent = `${allMyIdsData.length} ID (${soldIdsData.length} sold)`;
      updateMyIdsDisplay();
    }
  } catch(e) { console.error(e); }
}

function updateMyIdsDisplay() {
  const availableCount = document.getElementById('availableCount');
  const soldCount = document.getElementById('soldCount');
  if (availableCount) availableCount.textContent = `${availableIdsData.length} ID`;
  if (soldCount) soldCount.textContent = `${soldIdsData.length} ID`;
  renderAvailableIds(availableIdsData);
  renderSoldIds(soldIdsData);
  renderAvailablePagination();
}

function renderAvailableIds(ids) {
  const container = document.getElementById('availableContainer');
  if (!container) return;
  const start = (availableCurrentPage - 1) * ITEMS_PER_PAGE;
  const pageIds = ids.slice(start, start + ITEMS_PER_PAGE);
  if (pageIds.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)">Tidak ada ID available</div>';
    return;
  }
  container.innerHTML = `
    <div class="id-grid">
      ${pageIds.map(id => `
        <div class="id-card">
          <div class="id-code">${escapeHtml(id.id)}</div>
          <div class="id-status status-available">AVAILABLE</div>
          <div class="id-actions">
            <button class="id-btn" onclick="markAsSold('${escapeHtml(id.id)}', '${id.tier || detectTierFromID(id.id)}')">📦 Mark Sold</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderSoldIds(ids) {
  const container = document.getElementById('soldContainer');
  if (!container) return;
  if (ids.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)">Belum ada ID sold</div>';
    return;
  }
  container.innerHTML = `
    <div class="id-grid">
      ${ids.map(id => `
        <div class="id-card">
          <div class="id-code">${escapeHtml(id.id)}</div>
          <div class="id-status status-sold">SOLD</div>
          <div class="id-actions">
            <span style="font-size:.6rem;color:var(--muted);padding:4px 0;display:block">Tier: ${(id.tier || 'unknown').toUpperCase()}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderAvailablePagination() {
  const container = document.getElementById('availablePagination');
  if (!container) return;
  const totalPages = Math.ceil(availableIdsData.length / ITEMS_PER_PAGE);
  if (totalPages <= 1) { container.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= Math.min(totalPages, 5); i++) {
    html += `<div class="page-btn ${i === availableCurrentPage ? 'active' : ''}" onclick="goToAvailablePage(${i})">${i}</div>`;
  }
  container.innerHTML = html;
}

function goToAvailablePage(page) {
  availableCurrentPage = page;
  renderAvailableIds(availableIdsData);
  renderAvailablePagination();
}

async function markAsSold(id, tier) {
  if (!confirm(`Tandai ID ${id} sebagai sold?`)) return;
  showProgress(true, 'Memproses...');
  const result = await callAPI('sold', 'POST', { username: currentUser.username, soldIds: [id], tier: tier });
  if (result.success) {
    currentUser.soldTotal = (currentUser.soldTotal || 0) + 1;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    showNotification('success', 'Berhasil!', `${id} ditandai sold`);
    await loadMyIdsData();
  } else {
    showNotification('error', 'Gagal', 'Gagal menandai sold');
  }
  showProgress(false);
}

function searchMyIds() {
  const query = document.getElementById('searchIdInput')?.value.trim().toLowerCase() || '';
  if (!query) {
    updateMyIdsDisplay();
    return;
  }
  const filteredAvailable = availableIdsData.filter(item => item.id.toLowerCase().includes(query));
  const filteredSold = soldIdsData.filter(item => item.id.toLowerCase().includes(query));
  renderAvailableIds(filteredAvailable);
  renderSoldIds(filteredSold);
}

async function submitAddIDs() {
  const raw = document.getElementById('addIdList').value;
  if (!raw.trim()) { showNotification('error', 'Gagal', 'Daftar ID kosong'); return; }
  const newIDs = [...new Set(raw.split('\n').map(l => l.trim()).filter(Boolean))];
  if (newIDs.length === 0) return;
  
  showProgress(true, 'Mengecek duplikat...');
  const idsByTier = { low: [], medium: [], high: [], legend: [] };
  for (const id of newIDs) {
    const tier = detectTierFromID(id);
    idsByTier[tier].push(id);
  }
  
  let allSuccess = true;
  for (const [tier, ids] of Object.entries(idsByTier)) {
    if (ids.length === 0) continue;
    const result = await callAPI('ids', 'POST', { username: currentUser.username, tier: tier, ids: ids });
    if (!result.success) allSuccess = false;
  }
  
  if (allSuccess) {
    currentUser.total = (currentUser.total || 0) + newIDs.length;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    showNotification('success', 'Berhasil!', `${newIDs.length} ID berhasil ditambahkan!`);
    document.getElementById('addIdList').value = '';
    document.getElementById('autoDetectResult').innerHTML = '';
    if (currentPage === 'myids') await loadMyIdsData();
  } else {
    showNotification('error', 'Gagal', 'Gagal menambahkan ID');
  }
  showProgress(false);
}

async function saveHarga() {
  const low = parseInt(document.getElementById('priceLow').value) || 500;
  const medium = parseInt(document.getElementById('priceMedium').value) || 10000;
  const high = parseInt(document.getElementById('priceHigh').value) || 15000;
  const legend = parseInt(document.getElementById('priceLegend').value) || 30000;
  
  showProgress(true, 'Menyimpan harga...');
  const result = await callAPI('update-price', 'POST', {
    username: currentUser.username,
    prices: { low, medium, high, legend }
  });
  showProgress(false);
  
  if (result.success) {
    currentUser.price = { low, medium, high, legend };
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    showNotification('success', 'Berhasil!', 'Harga berhasil diupdate!');
  } else {
    showNotification('error', 'Gagal', 'Gagal update harga');
  }
}

async function saveProfile() {
  const photo = document.getElementById('editPhoto').value.trim();
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  const wa = document.getElementById('editWhatsapp').value.trim();
  
  if (!name) { showNotification('error', 'Gagal', 'Nama tidak boleh kosong'); return; }
  
  showProgress(true, 'Menyimpan profile...');
  const result = await callAPI('profile', 'POST', { username: currentUser.username, name, photo, bio, wa });
  showProgress(false);
  
  if (result.success) {
    currentUser.name = name;
    currentUser.photo = photo;
    currentUser.bio = bio;
    currentUser.wa = wa;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    document.getElementById('welcomeName').textContent = name;
    showNotification('success', 'Berhasil!', 'Profile berhasil diupdate!');
    if (currentPage === 'profile') renderPage('profile');
  } else {
    showNotification('error', 'Gagal', 'Gagal update profile');
  }
}

function previewAutoDetect() {
  const raw = document.getElementById('addIdList')?.value;
  if (!raw || !raw.trim()) {
    const resultDiv = document.getElementById('autoDetectResult');
    if (resultDiv) resultDiv.style.display = 'none';
    return;
  }
  const ids = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const tierGroups = { low: 0, medium: 0, high: 0, legend: 0 };
  for (const id of ids) {
    const tier = detectTierFromID(id);
    tierGroups[tier]++;
  }
  const resultDiv = document.getElementById('autoDetectResult');
  if (resultDiv) {
    resultDiv.innerHTML = `
      <div class="title">📊 Hasil Deteksi:</div>
      <div class="tier-row low">🔵 LOW: ${tierGroups.low} ID</div>
      <div class="tier-row medium">🟢 MEDIUM: ${tierGroups.medium} ID</div>
      <div class="tier-row high">🟠 HIGH: ${tierGroups.high} ID</div>
      <div class="tier-row legend">🟣 LEGEND: ${tierGroups.legend} ID</div>
    `;
    resultDiv.style.display = 'block';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// ==================== RENDER PAGE ====================
async function renderPage(page) {
  currentPage = page;
  const contentDiv = document.getElementById('pageContent');
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => {
    if (item.getAttribute('data-page') === page) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
  
  switch(page) {
    case 'dashboard':
      contentDiv.innerHTML = renderDashboardPage();
      break;
    case 'addid':
      contentDiv.innerHTML = renderAddIdPage();
      const textarea = document.getElementById('addIdList');
      if (textarea) {
        textarea.addEventListener('input', previewAutoDetect);
      }
      break;
    case 'myids':
      contentDiv.innerHTML = renderMyIdsPage();
      await loadMyIdsData();
      const searchInput = document.getElementById('searchIdInput');
      if (searchInput) {
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchMyIds(); });
      }
      break;
    case 'harga':
      contentDiv.innerHTML = renderHargaPage();
      break;
    case 'profile':
      contentDiv.innerHTML = renderProfilePage();
      break;
  }
}

// ==================== LOGOUT ====================
function logout() {
  localStorage.removeItem('contributor_user');
  window.location.href = '../login/login.html';
}

// ==================== INIT & NAVIGATION ====================
function initNavigation() {
  const navItems = document.querySelectorAll('.nav-item[data-page]');
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const page = item.getAttribute('data-page');
      renderPage(page);
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
      }
    });
  });
  document.getElementById('logoutBtn').addEventListener('click', logout);
  
  // Mobile menu toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
  }
}

// ==================== START ====================
(async () => {
  if (!checkAuth()) return;
  initNavigation();
  await renderPage('dashboard');
})();
</script>
