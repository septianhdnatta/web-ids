<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --bg2:#111111;
  --card:#161616;
  --card2:#1a1a1a;
  --border:#232323;
  --border2:#2a2a2a;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#888;
  --white:#fff;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --gold:#fbbf24;
  --gold-glow:rgba(251,191,36,0.6);
  --silver:#d1d5db;
  --bronze:#fb923c;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:80px 20px 40px;
  position:relative;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* BACKGROUND GLOW */
.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 65%);pointer-events:none;z-index:0}
.bg-glow2{position:fixed;top:20%;left:20%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.025) 0%,transparent 65%);pointer-events:none;z-index:0}
.bg-glow3{position:fixed;bottom:10%;right:15%;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.02) 0%,transparent 65%);pointer-events:none;z-index:0}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(13,13,13,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.95rem;font-weight:700;color:var(--white);text-decoration:none}
.nav-logo-icon{width:24px;height:24px;background:var(--white);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#000;font-weight:900}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-link{font-size:.82rem;color:var(--muted2);text-decoration:none;transition:color .2s;font-weight:400}
.nav-link:hover{color:var(--white)}
.nav-link.active{color:var(--white)}

/* LOADER */
#loadingState{position:relative;z-index:1;text-align:center;color:var(--muted);font-family:var(--mono);font-size:.78rem}
.spinner{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--white);animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE PILL */
.page-pill{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);padding:.3rem .9rem;border-radius:99px;font-size:.72rem;color:var(--muted2);margin-bottom:28px;animation:fadeUp .6s ease both;position:relative;z-index:1}
.page-pill-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LEADERBOARD WRAP */
.leader-wrap{position:relative;z-index:1;max-width:800px;width:100%;animation:fadeUp .6s .08s ease both}

/* PODIUM (TOP 3) */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:20px;margin-bottom:40px;padding:20px 0}
.podium-item{text-align:center;cursor:pointer;transition:all .3s ease;position:relative}
.podium-item:hover{transform:translateY(-8px)}

/* Efek glow untuk podium item */
.podium-item.rank-1:hover .podium-avatar-wrapper{box-shadow:0 0 30px var(--gold-glow)}
.podium-item.rank-2:hover .podium-avatar-wrapper{box-shadow:0 0 25px rgba(209,213,219,0.4)}
.podium-item.rank-3:hover .podium-avatar-wrapper{box-shadow:0 0 25px rgba(251,146,60,0.4)}

/* WRAPPER AVATAR UNTUK MAHKOTA */
.podium-avatar-wrapper{
  position:relative;
  width:90px;
  height:90px;
  margin:0 auto 10px;
  border-radius:50%;
  transition:all .3s ease;
}

/* MAHKOTA FLOATING */
.crown{
  position:absolute;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  font-size:2rem;
  filter:drop-shadow(0 0 8px var(--gold));
  animation:floatCrown 2s ease-in-out infinite, crownGlow 1.5s ease-in-out infinite;
  z-index:10;
  pointer-events:none;
}

/* Efek floating mahkota */
@keyframes floatCrown{
  0%,100%{transform:translateX(-50%) translateY(0px)}
  50%{transform:translateX(-50%) translateY(-5px)}
}

/* Efek glow mahkota */
@keyframes crownGlow{
  0%,100%{filter:drop-shadow(0 0 4px var(--gold)) drop-shadow(0 0 8px rgba(251,191,36,0.5));}
  50%{filter:drop-shadow(0 0 12px var(--gold)) drop-shadow(0 0 20px rgba(251,191,36,0.8));}
}

/* Efek khusus untuk rank 1 - background glow pulsing */
.podium-item.rank-1 .podium-avatar-wrapper::before{
  content:'';
  position:absolute;
  top:-5px;
  left:-5px;
  right:-5px;
  bottom:-5px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(251,191,36,0.3), transparent 70%);
  animation:pulseGlow 2s ease-in-out infinite;
  z-index:-1;
}

@keyframes pulseGlow{
  0%,100%{opacity:0.3; transform:scale(1);}
  50%{opacity:0.8; transform:scale(1.05);}
}

/* AVATAR */
.podium-avatar{
  width:100%;
  height:100%;
  border-radius:50%;
  border:3px solid var(--border2);
  background:var(--card2);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2;
  transition:all .3s ease;
}
.podium-avatar img{width:100%;height:100%;object-fit:cover}
.podium-avatar span{font-size:1.5rem;font-weight:700;color:var(--muted)}

/* Border berwarna untuk peringkat */
.podium-item.rank-1 .podium-avatar{border-color:var(--gold);box-shadow:0 0 15px rgba(251,191,36,0.4)}
.podium-item.rank-2 .podium-avatar{border-color:var(--silver);box-shadow:0 0 10px rgba(209,213,219,0.3)}
.podium-item.rank-3 .podium-avatar{border-color:var(--bronze);box-shadow:0 0 10px rgba(251,146,60,0.3)}

.podium-rank{
  font-family:var(--mono);
  font-weight:800;
  font-size:1.1rem;
  margin-bottom:6px;
}
.podium-rank.gold{color:var(--gold);text-shadow:0 0 8px rgba(251,191,36,.5)}
.podium-rank.silver{color:var(--silver)}
.podium-rank.bronze{color:var(--bronze)}
.podium-name{
  font-size:.85rem;
  font-weight:600;
  color:var(--white);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  flex-wrap:wrap;
}
.podium-usn{
  font-size:.65rem;
  color:var(--muted2);
  font-family:var(--mono);
  margin-top:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.podium-count{font-size:.7rem;color:var(--muted);margin-top:4px}

/* VERIFIED ICON KECIL */
.verified-icon-sm{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;vertical-align:middle}
.verified-icon-sm img{width:100%;height:100%;object-fit:contain}

/* ROLE BADGE */
.role-badge-sm{font-size:.55rem;font-weight:600;padding:.12rem .45rem;border-radius:12px;font-family:var(--mono);margin-left:5px}
.role-dv-sm{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.role-cb-sm{background:rgba(156,163,175,.12);color:#9ca3af;border:1px solid rgba(156,163,175,.2)}

/* LEADERBOARD TABLE */
.leader-panel{background:var(--card);border:1px solid var(--border2);border-radius:20px;overflow:hidden}
.leader-header{
  display:grid;
  grid-template-columns:80px 1fr 100px;
  padding:16px 20px;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--border2);
  font-size:.7rem;
  font-weight:600;
  color:var(--muted2);
  text-transform:uppercase;
  letter-spacing:1px
}
.leader-list{
  max-height:520px;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.leader-list::-webkit-scrollbar{width:4px}
.leader-list::-webkit-scrollbar-track{background:transparent}
.leader-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.leader-row{
  display:grid;
  grid-template-columns:80px 1fr 100px;
  align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  transition:all .2s;
  cursor:pointer;
  text-decoration:none;
  color:var(--text);
}
.leader-row:hover{background:var(--card2);transform:translateX(4px)}

/* RANK STYLES */
.rank{font-family:var(--mono);font-weight:700;font-size:1.1rem}
.rank-1{color:var(--gold);text-shadow:0 0 8px rgba(251,191,36,.3)}
.rank-2{color:var(--silver)}
.rank-3{color:var(--bronze)}
.rank-other{color:var(--muted2)}

/* CONTRIBUTOR INFO */
.contributor-info{display:flex;align-items:center;gap:12px}
.leader-avatar{width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--muted);flex-shrink:0}
.leader-avatar img{width:100%;height:100%;object-fit:cover}
.leader-name{font-weight:600;color:var(--white);font-size:.9rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.leader-usn{font-size:.67rem;color:var(--muted2);font-family:var(--mono);margin-top:2px;display:flex;align-items:center;gap:4px}

/* TOTAL ID */
.total-id{font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--white);text-align:right}
.total-id-label{font-size:.58rem;color:var(--muted);margin-top:2px;text-align:right}

/* BACK LINK */
.back-link{margin-top:28px;text-align:center;position:relative;z-index:1}
.back-link a{color:var(--muted);font-size:.75rem;text-decoration:none;transition:color .2s;display:inline-flex;align-items:center;gap:6px}
.back-link a:hover{color:var(--white)}

/* EFEK CONFETTI (optional) */
.confetti{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1000;
  overflow:hidden;
}
.confetti-piece{
  position:absolute;
  width:8px;
  height:8px;
  background:var(--gold);
  opacity:0;
  animation:confettiFall 3s ease-out forwards;
}
@keyframes confettiFall{
  0%{opacity:1; transform:translateY(-100vh) rotate(0deg);}
  100%{opacity:0; transform:translateY(100vh) rotate(720deg);}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  nav{padding:0 20px}
  .nav-links{display:none}
  .leader-header{grid-template-columns:60px 1fr 80px;padding:12px 16px}
  .leader-row{grid-template-columns:60px 1fr 80px;padding:12px 16px}
  .rank{font-size:.9rem}
  .leader-avatar{width:32px;height:32px}
  .leader-name{font-size:.8rem}
  .podium{gap:12px}
  .podium-avatar-wrapper{width:65px;height:65px}
  .crown{font-size:1.5rem;top:-15px}
  .podium-name{font-size:.75rem}
  .podium-usn{font-size:.6rem}
  .verified-icon-sm{width:12px;height:12px}
  .podium-rank{font-size:.9rem}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="bg-glow3"></div>

<nav>
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-icon">ID</div>
    IDglitxh
  </a>
  <div class="nav-links">
    <a href="../index.html#scores" class="nav-link">Koleksi</a>
    <a href="../index.html#fitur" class="nav-link">Fitur</a>
    <a href="../index.html#stok" class="nav-link">Stok</a>
    <a href="../contact.html" class="nav-link">Contact</a>
  </div>
</nav>

<div class="page-pill">
  <div class="page-pill-dot"></div>
  <span>Contributor Leaderboard</span>
</div>

<div class="leader-wrap">
  
  <!-- PODIUM TOP 3 -->
  <div id="podiumContainer" style="display:none"></div>

  <!-- LEADERBOARD TABLE -->
  <div class="leader-panel">
    <div class="leader-header">
      <span>RANK</span>
      <span>CONTRIBUTOR</span>
      <span style="text-align:right">TOTAL ID</span>
    </div>
    <div class="leader-list" id="leaderList">
      <div style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:.78rem">
        <div class="spinner"></div>
        Memuat leaderboard...
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="../index.html">← Kembali ke Beranda</a>
  </div>
</div>

<script>
// ==================== KONFIGURASI ====================
const API_URL = '/api';
const VERIFIED_ICON_URL = 'https://img.icons8.com/?size=100&id=98A4yZTt9abw&format=png&color=000000';

// ==================== FUNGSI API ====================
async function fetchAPI(endpoint) {
  try {
    const res = await fetch(`${API_URL}/${endpoint}.js`);
    return await res.json();
  } catch { return { success: false, data: [] }; }
}

// ==================== EFEK CONFETTI ====================
function showConfetti() {
  const colors = ['#fbbf24', '#f59e0b', '#d97706', '#fcd34d', '#ffd700'];
  for(let i = 0; i < 100; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti-piece';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.width = Math.random() * 8 + 4 + 'px';
    confetti.style.height = confetti.style.width;
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDelay = Math.random() * 2 + 's';
    confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 5000);
  }
}

// ==================== LOAD LEADERBOARD ====================
async function loadLeaderboard() {
  const result = await fetchAPI('contributors');
  
  if (!result.success || !result.data || result.data.length === 0) {
    document.getElementById('leaderList').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:.78rem">
        ⚠️ Belum ada contributor terdaftar.
      </div>`;
    return;
  }

  // Urutkan berdasarkan total ID (terbanyak ke terkecil)
  const sorted = [...result.data].sort((a, b) => (b.total || 0) - (a.total || 0));
  
  // Tampilkan confetti jika ada rank 1 dengan total ID > 0
  if(sorted[0] && (sorted[0].total || 0) > 0) {
    setTimeout(showConfetti, 500);
  }
  
  // Render Podium (Top 3)
  renderPodium(sorted.slice(0, 3));
  
  // Render Leaderboard List
  renderLeaderList(sorted);
}

function renderPodium(top3) {
  const podiumContainer = document.getElementById('podiumContainer');
  if (top3.length === 0) {
    podiumContainer.style.display = 'none';
    return;
  }
  
  podiumContainer.style.display = 'flex';
  podiumContainer.className = 'podium';
  
  const medals = ['gold', 'silver', 'bronze'];
  const ranks = ['#1', '#2', '#3'];
  const rankClasses = ['rank-1', 'rank-2', 'rank-3'];
  
  podiumContainer.innerHTML = top3.map((con, idx) => {
    const medalClass = medals[idx];
    const rankLabel = ranks[idx];
    const rankClass = rankClasses[idx];
    const verifiedBadge = (con.verified === true) 
      ? `<span class="verified-icon-sm"><img src="${VERIFIED_ICON_URL}" alt="✓"/></span>` 
      : '';
    const roleBadge = con.role === 'DV' 
      ? `<span class="role-badge-sm role-dv-sm">DV</span>` 
      : `<span class="role-badge-sm role-cb-sm">CB</span>`;
    
    const avatarHtml = con.photo 
      ? `<img src="${con.photo}" alt="${con.name}" onerror="this.parentElement.innerHTML='<span>${(con.username||'?').charAt(0).toUpperCase()}</span>'">`
      : `<span>${(con.username||'?').charAt(0).toUpperCase()}</span>`;
    
    // Mahkota hanya untuk rank 1
    const crownHtml = idx === 0 ? '<div class="crown">👑</div>' : '';
    
    return `
      <div class="podium-item ${rankClass}" onclick="location.href='profile.html?u=${encodeURIComponent(con.username)}'">
        <div class="podium-avatar-wrapper">
          ${crownHtml}
          <div class="podium-avatar">${avatarHtml}</div>
        </div>
        <div class="podium-rank ${medalClass}">${rankLabel}</div>
        <div class="podium-name">
          ${escapeHtml(con.name)}
          ${roleBadge}
        </div>
        <div class="podium-usn">
          @${con.username}
          ${verifiedBadge}
        </div>
        <div class="podium-count">${(con.total || 0).toLocaleString('id-ID')} ID</div>
      </div>
    `;
  }).join('');
}

function renderLeaderList(sorted) {
  const container = document.getElementById('leaderList');
  
  if (sorted.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">Belum ada contributor.</div>`;
    return;
  }
  
  container.innerHTML = sorted.map((con, idx) => {
    const rank = idx + 1;
    let rankClass = 'rank-other';
    let rankIcon = '';
    if (rank === 1) { rankClass = 'rank-1'; rankIcon = '👑 '; }
    else if (rank === 2) rankClass = 'rank-2';
    else if (rank === 3) rankClass = 'rank-3';
    
    const role = con.role || 'CB';
    const roleClass = role === 'DV' ? 'role-dv-sm' : 'role-cb-sm';
    const roleLabel = role === 'DV' ? 'DV' : 'CB';
    
    const verifiedBadge = (con.verified === true) 
      ? `<span class="verified-icon-sm"><img src="${VERIFIED_ICON_URL}" alt="✓"/></span>` 
      : '';
    
    const avatarHtml = con.photo
      ? `<img src="${con.photo}" alt="${con.name}" onerror="this.parentElement.innerHTML='${(con.username||'?').charAt(0).toUpperCase()}'">`
      : `<span style="font-size:.8rem;font-weight:700">${(con.username||'?').charAt(0).toUpperCase()}</span>`;
    
    return `
      <a class="leader-row" href="profile.html?u=${encodeURIComponent(con.username)}">
        <div class="rank ${rankClass}">${rankIcon}${rank}</div>
        <div class="contributor-info">
          <div class="leader-avatar">${avatarHtml}</div>
          <div>
            <div class="leader-name">
              ${escapeHtml(con.name)}
              <span class="role-badge-sm ${roleClass}">${roleLabel}</span>
            </div>
            <div class="leader-usn">
              @${con.username}
              ${verifiedBadge}
            </div>
          </div>
        </div>
        <div class="total-id">
          ${(con.total || 0).toLocaleString('id-ID')}
          <div class="total-id-label">ID</div>
        </div>
      </a>
    `;
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

loadLeaderboard();
</script>
</body>
</html>
