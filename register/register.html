<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register Contributor — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--card:#161616;--card2:#1a1a1a;--border:#232323;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#888;--white:#fff;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --purple:#a855f7;--pink:#ec4899;
  --font:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow-x:hidden;
}
.hero-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.1) 0%,transparent 65%);pointer-events:none;z-index:0}
.register-container{position:relative;z-index:1;width:100%;max-width:400px}
.register-card{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:36px;text-align:center;backdrop-filter:blur(10px)}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--purple),var(--pink));border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.logo-icon svg{width:24px;height:24px;stroke:#fff}
h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{font-size:.72rem;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:16px;text-align:left}
.field label{font-size:.68rem;color:var(--muted2);display:block;margin-bottom:6px;font-family:var(--mono)}
.field input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:.62rem .85rem;color:var(--text);font-family:var(--mono);font-size:.78rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--purple)}
.field input::placeholder{color:var(--muted);font-size:.7rem}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff}
.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05)}
.auth-switch{font-size:.72rem;color:var(--muted);margin-top:16px}
.auth-switch a{color:var(--purple);text-decoration:none}
.back-link{margin-top:16px;text-align:center}
.back-link a{color:var(--muted);font-size:.72rem;text-decoration:none}
.back-link a:hover{color:var(--white)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:.75rem;display:flex;align-items:center;gap:8px;z-index:9999;transition:all .3s;opacity:0;transform:translateY(12px);pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok .toast-dot{background:var(--green)}
.toast.err .toast-dot{background:var(--red)}
.toast-dot{width:7px;height:7px}
.progress-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;display:none}
.progress-overlay.show{display:flex}
.progress-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:32px;text-align:center}
.progress-spinner{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--white);animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hero-glow"></div>

<div class="register-container">
  <div class="register-card">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </div>
    <h1>Daftar Contributor</h1>
    <p class="sub">Isi data untuk bergabung</p>
    
    <div class="field">
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="cth: natas">
    </div>
    <div class="field">
      <label>Nama Lengkap</label>
      <input type="text" id="regName" placeholder="cth: Natas">
    </div>
    <div class="field">
      <label>WhatsApp</label>
      <input type="tel" id="regWa" placeholder="6281234567890">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="******">
    </div>
    
    <button class="btn btn-primary" onclick="doRegister()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Daftar & Mulai
    </button>
    
    <div class="auth-switch">
      <span>Sudah punya akun? </span>
      <a href="../login/login.html">Login disini</a>
    </div>
    
    <div class="back-link">
      <a href="../index.html">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><div class="toast-msg"></div></div>
<div class="progress-overlay" id="progressOverlay"><div class="progress-card"><div class="progress-spinner"></div><div class="progress-title">Mendaftar...</div></div></div>

<script>
const API_URL = '/api';

async function doRegister() {
  const username = document.getElementById('regUsername').value.trim().toLowerCase().replace(/\s+/g, '-');
  const name = document.getElementById('regName').value.trim();
  const wa = document.getElementById('regWa').value.trim();
  const password = document.getElementById('regPassword').value;

  // Validasi
  if (!username || !name || !wa || !password) {
    showToast('Semua field wajib diisi', 'err');
    return;
  }

  showProgress(true);

  try {
    const response = await fetch(`${API_URL}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, name, wa, password })
    });

    const data = await response.json();
    showProgress(false);

    if (data.success) {
      // LANGSUNG simpan data user ke localStorage
      localStorage.setItem('contributor_user', JSON.stringify(data.data));
      showToast('✅ Pendaftaran berhasil! Mengarahkan ke dashboard...', 'ok');
      setTimeout(() => {
        window.location.href = '../dashboard/dashboard.html';
      }, 1500);
    } else {
      showToast(data.error || 'Gagal mendaftar', 'err');
    }
  } catch (error) {
    showProgress(false);
    console.error('Register error:', error);
    showToast('❌ Gagal terhubung ke server', 'err');
  }
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showProgress(show) {
  const el = document.getElementById('progressOverlay');
  if (show) el.classList.add('show');
  else el.classList.remove('show');
}

// Enter key support
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doRegister();
  });
});
</script>
</body>
</html>
