<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register Contributor — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--card:#161616;--card2:#1a1a1a;--border:#232323;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#888;--white:#fff;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --purple:#a855f7;--pink:#ec4899;
  --font:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow-x:hidden;
}
.hero-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.1) 0%,transparent 65%);pointer-events:none;z-index:0}
.register-container{position:relative;z-index:1;width:100%;max-width:400px}
.register-card{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:36px;text-align:center;backdrop-filter:blur(10px)}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--purple),var(--pink));border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.logo-icon svg{width:24px;height:24px;stroke:#fff}
h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{font-size:.72rem;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:16px;text-align:left}
.field label{font-size:.68rem;color:var(--muted2);display:block;margin-bottom:6px;font-family:var(--mono)}
.field input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:.62rem .85rem;color:var(--text);font-family:var(--mono);font-size:.78rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--purple)}
.field input::placeholder{color:var(--muted);font-size:.7rem}
.char-counter{font-size:.6rem;color:var(--muted);text-align:right;margin-top:4px;font-family:var(--mono)}
.char-counter.warning{color:var(--red)}
.char-counter.valid{color:var(--green)}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff}
.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05);box-shadow:0 4px 12px rgba(168,85,247,.3)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.auth-switch{font-size:.72rem;color:var(--muted);margin-top:16px}
.auth-switch a{color:var(--purple);text-decoration:none}
.back-link{margin-top:16px;text-align:center}
.back-link a{color:var(--muted);font-size:.72rem;text-decoration:none}
.back-link a:hover{color:var(--white)}

/* NOTIFICATION POPUP */
.notification{position:fixed;bottom:24px;right:24px;background:var(--card2);border-radius:16px;padding:0;width:360px;max-width:calc(100vw - 48px);box-shadow:0 20px 40px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.05);transform:translateX(420px);transition:transform .4s cubic-bezier(.2,.9,.4,1.1);z-index:10000;overflow:hidden}
.notification.show{transform:translateX(0)}
.notification-content{display:flex;align-items:center;gap:14px;padding:14px 18px}
.notification-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notification-icon.success{background:rgba(16,185,129,.15)}
.notification-icon.error{background:rgba(239,68,68,.15)}
.notification-icon.warning{background:rgba(245,158,11,.15)}
.notification-icon svg{width:22px;height:22px}
.notification-icon.success svg{stroke:var(--green)}
.notification-icon.error svg{stroke:var(--red)}
.notification-icon.warning svg{stroke:var(--yellow)}
.notification-text{flex:1}
.notification-title{font-size:.85rem;font-weight:600;color:var(--white);margin-bottom:2px}
.notification-message{font-size:.7rem;color:var(--muted2);line-height:1.4}
.notification-progress{height:3px;width:100%;background:rgba(255,255,255,.05)}
.notification-progress-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--green),#34d399);transition:width 3s linear}
.notification-progress-bar.error{background:linear-gradient(90deg,var(--red),#f87171)}
.notification-progress-bar.warning{background:linear-gradient(90deg,var(--yellow),#fbbf24)}
.notification-close{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.notification-close:hover{background:rgba(255,255,255,.1)}
.notification-close svg{width:14px;height:14px;stroke:var(--muted2)}

.progress-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;display:none}
.progress-overlay.show{display:flex}
.progress-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:32px;text-align:center}
.progress-spinner{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--purple);animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hero-glow"></div>

<div class="register-container">
  <div class="register-card">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </div>
    <h1>Daftar Contributor</h1>
    <p class="sub">Isi data untuk bergabung</p>
    
    <div class="field">
      <label>Username (max 7 karakter)</label>
      <input type="text" id="regUsername" placeholder="cth: natas" maxlength="7">
      <div class="char-counter" id="usernameCounter">0 / 7 karakter</div>
    </div>
    
    <div class="field">
      <label>Nama Lengkap (max 5 karakter)</label>
      <input type="text" id="regName" placeholder="cth: Natas" maxlength="5">
      <div class="char-counter" id="nameCounter">0 / 5 karakter</div>
    </div>
    
    <div class="field">
      <label>WhatsApp</label>
      <input type="tel" id="regWa" placeholder="6281234567890">
    </div>
    
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="******">
    </div>
    
    <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Daftar & Mulai
    </button>
    
    <div class="auth-switch">
      <span>Sudah punya akun? </span>
      <a href="../login/login.html">Login disini</a>
    </div>
    
    <div class="back-link">
      <a href="../index.html">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<!-- NOTIFICATION POPUP -->
<div class="notification" id="notification">
  <div class="notification-content">
    <div class="notification-icon" id="notificationIcon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="notification-text">
      <div class="notification-title" id="notificationTitle">Success!</div>
      <div class="notification-message" id="notificationMessage">Operation completed successfully</div>
    </div>
    <div class="notification-close" onclick="hideNotification()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div class="notification-progress">
    <div class="notification-progress-bar" id="notificationProgress"></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-card">
    <div class="progress-spinner"></div>
    <div class="progress-title">Mendaftar...</div>
  </div>
</div>

<script>
const API_URL = '/api';
let notificationTimer = null;
let redirectTimer = null;

// ==================== VALIDASI INPUT ====================
function validateInputs() {
  const username = document.getElementById('regUsername').value.trim();
  const name = document.getElementById('regName').value.trim();
  const wa = document.getElementById('regWa').value.trim();
  const password = document.getElementById('regPassword').value;
  
  let isValid = true;
  let errorMsg = '';
  
  // Validasi username: 1-7 karakter, hanya huruf/angka/dash
  if (!username) {
    errorMsg = 'Username wajib diisi';
    isValid = false;
  } else if (username.length < 1) {
    errorMsg = 'Username minimal 1 karakter';
    isValid = false;
  } else if (username.length > 7) {
    errorMsg = 'Username maksimal 7 karakter';
    isValid = false;
  } else if (!/^[a-zA-Z0-9-]+$/.test(username)) {
    errorMsg = 'Username hanya boleh huruf, angka, dan dash (-)';
    isValid = false;
  }
  
  // Validasi nama: 1-5 karakter
  else if (!name) {
    errorMsg = 'Nama wajib diisi';
    isValid = false;
  } else if (name.length < 1) {
    errorMsg = 'Nama minimal 1 karakter';
    isValid = false;
  } else if (name.length > 5) {
    errorMsg = 'Nama maksimal 5 karakter';
    isValid = false;
  }
  
  // Validasi WhatsApp
  else if (!wa) {
    errorMsg = 'Nomor WhatsApp wajib diisi';
    isValid = false;
  } else if (!/^[0-9]{10,15}$/.test(wa)) {
    errorMsg = 'Nomor WhatsApp harus 10-15 digit angka';
    isValid = false;
  }
  
  // Validasi password
  else if (!password) {
    errorMsg = 'Password wajib diisi';
    isValid = false;
  } else if (password.length < 4) {
    errorMsg = 'Password minimal 4 karakter';
    isValid = false;
  }
  
  // Enable/disable button
  const btn = document.getElementById('registerBtn');
  if (isValid) {
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
  
  return { isValid, errorMsg };
}

// ==================== UPDATE COUNTER & VALIDASI ====================
function updateUsernameCounter() {
  const input = document.getElementById('regUsername');
  const counter = document.getElementById('usernameCounter');
  const length = input.value.length;
  const max = 7;
  
  counter.textContent = `${length} / ${max} karakter`;
  
  if (length === max) {
    counter.classList.add('warning');
    counter.classList.remove('valid');
  } else if (length > 0 && length < max) {
    counter.classList.add('valid');
    counter.classList.remove('warning');
  } else {
    counter.classList.remove('warning', 'valid');
  }
  
  validateInputs();
}

function updateNameCounter() {
  const input = document.getElementById('regName');
  const counter = document.getElementById('nameCounter');
  const length = input.value.length;
  const max = 5;
  
  counter.textContent = `${length} / ${max} karakter`;
  
  if (length === max) {
    counter.classList.add('warning');
    counter.classList.remove('valid');
  } else if (length > 0 && length < max) {
    counter.classList.add('valid');
    counter.classList.remove('warning');
  } else {
    counter.classList.remove('warning', 'valid');
  }
  
  validateInputs();
}

// ==================== REGISTER ====================
async function doRegister() {
  const { isValid, errorMsg } = validateInputs();
  
  if (!isValid) {
    showNotification('error', 'Gagal', errorMsg);
    return;
  }
  
  const username = document.getElementById('regUsername').value.trim().toLowerCase().replace(/\s+/g, '-');
  const name = document.getElementById('regName').value.trim();
  const wa = document.getElementById('regWa').value.trim();
  const password = document.getElementById('regPassword').value;
  
  // Re-validasi username length
  if (username.length > 7) {
    showNotification('error', 'Gagal', 'Username maksimal 7 karakter');
    return;
  }
  
  // Re-validasi nama length
  if (name.length > 5) {
    showNotification('error', 'Gagal', 'Nama maksimal 5 karakter');
    return;
  }

  showProgress(true);

  try {
    const response = await fetch(`${API_URL}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, name, wa, password })
    });

    const data = await response.json();

    if (data.success) {
      localStorage.setItem('contributor_user', JSON.stringify(data.data));
      
      showProgress(false);
      showNotification('success', 'Pendaftaran Berhasil!', `Selamat datang ${name}! Mengarahkan ke dashboard...`);
      
      if (redirectTimer) clearTimeout(redirectTimer);
      redirectTimer = setTimeout(() => {
        window.location.href = '../dashboard/dashboard.html';
      }, 3000);
    } else {
      showProgress(false);
      showNotification('error', 'Pendaftaran Gagal', data.error || 'Terjadi kesalahan, coba lagi');
    }
  } catch (error) {
    showProgress(false);
    console.error('Register error:', error);
    showNotification('error', 'Koneksi Gagal', 'Tidak dapat terhubung ke server');
  }
}

// ==================== NOTIFICATION ====================
function showNotification(type, title, message) {
  const notification = document.getElementById('notification');
  const iconDiv = document.getElementById('notificationIcon');
  const titleDiv = document.getElementById('notificationTitle');
  const msgDiv = document.getElementById('notificationMessage');
  const progressBar = document.getElementById('notificationProgress');
  
  if (type === 'success') {
    iconDiv.className = 'notification-icon success';
    iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
    progressBar.className = 'notification-progress-bar';
  } else if (type === 'error') {
    iconDiv.className = 'notification-icon error';
    iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    progressBar.className = 'notification-progress-bar error';
  } else {
    iconDiv.className = 'notification-icon warning';
    iconDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    progressBar.className = 'notification-progress-bar warning';
  }
  
  titleDiv.textContent = title;
  msgDiv.textContent = message;
  progressBar.style.width = '100%';
  notification.classList.add('show');
  
  setTimeout(() => { progressBar.style.width = '0%'; }, 50);
  
  if (notificationTimer) clearTimeout(notificationTimer);
  notificationTimer = setTimeout(() => { hideNotification(); }, 3000);
}

function hideNotification() {
  const notification = document.getElementById('notification');
  notification.classList.remove('show');
  if (notificationTimer) clearTimeout(notificationTimer);
}

function showProgress(show) {
  const el = document.getElementById('progressOverlay');
  if (show) el.classList.add('show');
  else el.classList.remove('show');
}

// ==================== EVENT LISTENER ====================
document.getElementById('regUsername').addEventListener('input', updateUsernameCounter);
document.getElementById('regName').addEventListener('input', updateNameCounter);
document.getElementById('regWa').addEventListener('input', validateInputs);
document.getElementById('regPassword').addEventListener('input', validateInputs);

document.querySelectorAll('input').forEach(input => {
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const { isValid } = validateInputs();
      if (isValid) doRegister();
    }
  });
});

// ==================== INIT ====================
updateUsernameCounter();
updateNameCounter();
validateInputs();
</script>
</body>
</html>
